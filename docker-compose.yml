services:
  db:
    image: postgres:latest
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: postgres
      # POSTGRES_DB: fakebook_production
    volumes:
      - dbdata:/var/lib/postgresql/data]
    networks:
      - app-network

  redis:
    image: redis:latest
    ports: 
      - 6379:6379
    networks:
      - app-network

  web:
    build: .
    # command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -b '0.0.0.0'"
    volumes:
      - .:/rails
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    # env_file:
    #   - .env
    environment:
      # RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:password@db:5432/fakebook_development
      REDIS_URL: redis://redis:6379/1
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY_DEVELOPMENT}
    networks:
      - app-network

  sidekiq:
    build: .
    command: bundle exec sidekiq
    volumes:
      - .:/rails
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/fakebook_development
      REDIS_URL: redis://redis:6379/1
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY_DEVELOPMENT}
      RAILS_ENV: development
    networks:
      - app-network
    
  selenium:
    image: selenium/standalone-chromium:latest
    ports:
      - "4444:4444"
    # entrypoint: ["chromedriver", "--port=4444", "--headless"]
    networks:
      - app-network
    shm_size: '2gb'


networks:
  app-network:
    driver: bridge

volumes:
  dbdata: